server:
  port: 9191

h2:
  tcp:
    port: 9092


wakamiti:
  resourceTypes: gherkin
  resourcePath: src/test/resources
  outputFilePath: target/wakamiti/wakamiti.json
  junit:
    treatStepsAsTests: true
  logs:
    showStepSource: false
  database:
    connection:
      url: jdbc:h2:tcp://localhost:9092/mem:test
      username: sa
      password:
  rest:
    baseURL: http://localhost:9191/

logging:
  level:
    root: INFO
    org.springframework: INFO
    es.iti.wakamiti: INFO
    org.hibernate: INFO
    iti.commons.jext: INFO
spring.output.ansi.enabled: DETECT
