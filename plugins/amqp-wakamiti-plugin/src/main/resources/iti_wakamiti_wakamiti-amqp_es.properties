amqp.define.cleanup.purge.queue=Al finalizar, se vacía la cola {word}

amqp.define.connection.parameters=la conexión AMQP con URL {url:text} usando el usuario {username:text} y la contraseña {password:text}
amqp.define.connection.protocol=el protocolo AMQP {protocol:word}
amqp.define.destination.queue=la cola de destino {word}

amqp.send.json.from.string=se envía a la cola {word} el siguiente mensaje JSON:
amqp.send.json.from.file=se envía a la cola {queue:word} el mensaje del fichero JSON {file:file}
amqp.send.await=se espera durante {duration}
amqp.purge.queue=(que) se vacía la cola {word}

amqp.check.received.json.from.string=el siguiente mensaje JSON se recibe en {duration:duration}:
amqp.check.received.json.from.file=el mensaje del fichero JSON {file:file} se recibe en {duration:duration}
amqp.check.received.json.from.string.any-order=el siguiente mensaje JSON se recibe en {duration:duration} \\(en cualquier orden\\):
amqp.check.received.json.from.file.any-order=el mensaje del fichero JSON {file:file} se recibe en {duration:duration} \\(en cualquier orden\\)
amqp.check.received.json.loose.from.string=el siguiente fragmento JSON se recibe en {duration:duration}:
amqp.check.received.json.loose.from.file=el fragmento JSON del fichero {file:file} se recibe en {duration:duration}
amqp.check.received.none=no se recibe ningún mensaje durante {duration:duration}
