amqp.define.cleanup.purge.queue=On completion, the queue {word} is emptied

amqp.define.connection.parameters=the AMQP connection URL {url:text} using the user {username:text} and the password {password:text}
amqp.define.connection.protocol=the AMQP protocol {protocol:word}
amqp.define.destination.queue=the destination queue {word}
amqp.send.json.from.string=the following JSON message is sent to the queue {word}:
amqp.send.json.from.file=the message from the JSON file {file:file} is sent to the queue {queue:word}
amqp.send.await=wait for {duration}
amqp.purge.queue=(that) the queue {word} is emptied
amqp.check.received.json.from.string=the following JSON message is received within {duration:duration}:
amqp.check.received.json.from.file=the message from the JSON file {file:file} is received within {duration:duration}
amqp.check.received.json.from.string.any-order=the following JSON message is received within {duration:duration} \\(in any order\\):
amqp.check.received.json.from.file.any-order=the message from the JSON file {file:file} is received within {duration:duration} \\(in any order\\)
amqp.check.received.json.loose.from.string=the following JSON fragment is received within {duration:duration}:
amqp.check.received.json.loose.from.file=the JSON fragment from the file {file:file} is received within {duration:duration}
amqp.check.received.none=no message is received within {duration:duration}
